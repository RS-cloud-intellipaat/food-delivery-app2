---
- name: Configure Build Agent
  hosts: agent
  become: yes

  tasks:

    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Install Java 21
      apt:
        name: openjdk-21-jdk
        state: present

    - name: Install Docker
      apt:
        name: docker.io
        state: present

    - name: Enable and Start Docker
      service:
        name: docker
        enabled: yes
        state: started

    - name: Add ubuntu user to docker group
      user:
        name: ubuntu
        groups: docker
        append: yes

    - name: Verify Docker Service
      service_facts:

    - name: Display Docker Status
      debug:
        msg: "Docker service is {{ ansible_facts.services['docker.service'].state }}"
