---
# =====================================================
# Install Java & Jenkins on devops-master
# =====================================================

- name: Configure Jenkins Master
  hosts: master
  become: yes

  tasks:

    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Install Java
      apt:
        name: openjdk-17-jdk
        state: present

    - name: Install required packages
      apt:
        name:
          - curl
          - gnupg
        state: present

    - name: Add Jenkins repository key
      shell: |
        curl -fsSL https://pkg.jenkins.io/debian-stable/jenkins.io-2026.key \
        | tee /usr/share/keyrings/jenkins-keyring.asc > /dev/null

    - name: Add Jenkins repository
      shell: |
        echo "deb [signed-by=/usr/share/keyrings/jenkins-keyring.asc] https://pkg.jenkins.io/debian-stable binary/" \
        > /etc/apt/sources.list.d/jenkins.list

    - name: Update apt after adding Jenkins repository
      apt:
        update_cache: yes

    - name: Install Jenkins
      apt:
        name: jenkins
        state: present

    - name: Enable Jenkins
      service:
        name: jenkins
        enabled: yes

    - name: Start Jenkins
      service:
        name: jenkins
        state: started

    - name: Verify Jenkins Service
      service_facts:

    - name: Display Jenkins Status
      debug:
        msg: "{{ ansible_facts.services['jenkins.service'].state }}"

# =====================================================
# Install Java & Docker on Build Agent
# =====================================================

- name: Configure Docker Build Agent
  hosts: agent
  become: yes

  tasks:

    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Install Java
      apt:
        name: openjdk-17-jdk
        state: present

    - name: Install Docker
      apt:
        name: docker.io
        state: present

    - name: Start Docker
      service:
        name: docker
        state: started

    - name: Enable Docker
      service:
        name: docker
        enabled: yes

    - name: Add ubuntu user to docker group
      user:
        name: ubuntu
        groups: docker
        append: yes

    - name: Verify Docker Service
      service_facts:

    - name: Display Docker Status
      debug:
        msg: "{{ ansible_facts.services['docker.service'].state }}"
